name: Deploy Sanguo (CentOS)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Pull latest code on CentOS Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /root/sanguo
            echo "📥 Pulling latest code..."
            git pull origin main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend (Next.js)
        run: |
          cd frontend
          npm install
          echo "NEXT_PUBLIC_API_BASE=http://124.222.133.106:8000" > .env.production
          npm run build

      - name: Compress Build Artifacts
        run: |
          tar -czf frontend.tar.gz frontend/.next frontend/public frontend/package.json frontend/package-lock.json

      - name: Copy Frontend Build Artifacts via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "frontend.tar.gz"
          target: "/root/sanguo"

      - name: Install Production Dependencies and Reload Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /root/sanguo
            
            echo "📦 Extracting build artifacts..."
            tar -xzf frontend.tar.gz
            rm frontend.tar.gz

            cd frontend
            echo "📦 Installing production dependencies..."
            npm install --omit=dev

            echo "♻️ Reloading PM2 services..."
            pm2 reload all
