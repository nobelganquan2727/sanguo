<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <!-- Roller gradient for 3D cylinder look -->
    <linearGradient id="roller" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5c2c16" />
      <stop offset="50%" stop-color="#a0522d" />
      <stop offset="100%" stop-color="#4a220f" />
    </linearGradient>
    
    <!-- Paper gradient for aged parchment look -->
    <linearGradient id="paper" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#eae0c8" />
      <stop offset="10%" stop-color="#f4ecd8" />
      <stop offset="90%" stop-color="#f4ecd8" />
      <stop offset="100%" stop-color="#dfd3b6" />
    </linearGradient>
    
    <!-- Gold knobs gradient -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b8860b" />
      <stop offset="50%" stop-color="#ffd700" />
      <stop offset="100%" stop-color="#996515" />
    </linearGradient>
  </defs>

  <!-- Central Parchment Paper -->
  <rect x="5" y="5" width="22" height="22" rx="1.5" fill="url(#paper)" stroke="#8b5a2b" stroke-width="0.75"/>
  
  <!-- Red Silk Borders (Top & Bottom of paper) -->
  <path d="M 6 5 L 26 5 L 26 7 L 6 7 Z" fill="#b22222" opacity="0.9"/>
  <path d="M 6 25 L 26 25 L 26 27 L 6 27 Z" fill="#b22222" opacity="0.9"/>

  <!-- Left wooden roller -->
  <rect x="3" y="3.5" width="2.5" height="25" rx="0.5" fill="url(#roller)"/>
  <!-- Left roller knobs -->
  <rect x="2.75" y="2" width="3" height="1.5" rx="0.3" fill="url(#gold)"/>
  <rect x="2.75" y="28.5" width="3" height="1.5" rx="0.3" fill="url(#gold)"/>

  <!-- Right wooden roller -->
  <rect x="26.5" y="3.5" width="2.5" height="25" rx="0.5" fill="url(#roller)"/>
  <!-- Right roller knobs -->
  <rect x="26.25" y="2" width="3" height="1.5" rx="0.3" fill="url(#gold)"/>
  <rect x="26.25" y="28.5" width="3" height="1.5" rx="0.3" fill="url(#gold)"/>

  <!-- Calligraphy / Text abstraction -->
  <!-- Red seal/stamp at bottom-left -->
  <rect x="8" y="20" width="3" height="3" fill="#b22222" rx="0.3"/>
  <path d="M 9 21 L 10 21 M 9 22 L 10 22" stroke="#fff8e7" stroke-width="0.5"/>
  
  <!-- Vertical columns of characters (simulated) -->
  <!-- Column 1 -->
  <path d="M 22 9 L 22 13 M 22 15 L 22 19 M 22 21 L 22 23" stroke="#1c1c1c" stroke-width="1.2" stroke-linecap="round" stroke-dasharray="1.5 1"/>
  <!-- Column 2 -->
  <path d="M 18 10 L 18 14 M 18 16 L 18 21" stroke="#1c1c1c" stroke-width="1.2" stroke-linecap="round" stroke-dasharray="2 1.2"/>
  <!-- Column 3 -->
  <path d="M 14 8 L 14 12 M 14 14 L 14 18 M 14 20 L 14 22" stroke="#1c1c1c" stroke-width="1.2" stroke-linecap="round" stroke-dasharray="1 1"/>

</svg>
